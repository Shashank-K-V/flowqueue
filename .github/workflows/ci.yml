# ── .github/workflows/ci.yml ──────────────────────────────────────────────────
#
# Runs on every push and pull_request to main (or any branch).
# Steps:
#   1. Checkout code
#   2. Set up Python 3.12
#   3. Cache pip dependencies (speeds up subsequent runs ~50%)
#   4. Install dependencies
#   5. Run pytest with coverage
#   6. Upload coverage report to GitHub Actions summary
#
# No real Redis is required — all tests use fakeredis.

name: CI

on:
  push:
    branches: ["**"]       # all branches
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── 3. Cache pip ──────────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Invalidate cache when requirements.txt changes
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Run pytest with coverage ───────────────────────────────────────────
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov=worker \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v
        env:
          # Use default config values (fakeredis overrides the real Redis URL in tests)
          REDIS_URL: redis://localhost:6379/0
          MAX_RETRIES: "3"
          TTL_SECONDS: "3600"

      # ── 6. Upload coverage summary ────────────────────────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
